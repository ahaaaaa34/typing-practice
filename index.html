<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイピング練習 - 日本語入力</title>
<style>
:root {
  --bg1: #eef1f9; --bg2: #e4e9f5;
  --card: #ffffff;
  --ink: #2b2f3a; --muted: #8b93a7; --faint: #c2c8d6;
  --primary: #4f6bed; --primary-d: #3b53c4;
  --accent: #ef4d4d; --accent-d: #d23b3b;
  --ok: #34c27a;
  --key: #eef1f6; --key-edge: #c4cad8; --key-ink: #4a5163;
  --radius: 16px;
  --sh-sm: 0 1px 3px rgba(30,40,80,.08);
  --sh-md: 0 6px 20px rgba(30,40,80,.10);
  --sh-lg: 0 18px 50px rgba(20,30,70,.28);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, 'Hiragino Kaku Gothic ProN',
               'Hiragino Sans', 'Yu Gothic', Meiryo, sans-serif;
  color: var(--ink);
  background: linear-gradient(160deg, var(--bg1), var(--bg2));
  min-height: 100vh;
  display: flex; flex-direction: column;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  background: linear-gradient(120deg, #41538f, #5468c0);
  color: white;
  padding: 12px clamp(16px, 4vw, 32px);
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 18px rgba(40,55,120,.28);
  position: sticky; top: 0; z-index: 50; flex-shrink: 0;
}
.hdr-left { display: flex; align-items: baseline; gap: 10px; }
.hdr-title { font-size: 18px; font-weight: 800; letter-spacing: .04em; display: flex; align-items: center; gap: 8px; }
.hdr-title::before { content: '⌨'; font-size: 20px; }
.hdr-sub { font-size: 12px; opacity: .75; letter-spacing: .08em; }
.hdr-right { display: flex; align-items: center; gap: 14px; }
.elapsed-label { font-size: 12px; opacity: .8; letter-spacing: .06em; }
.elapsed-text {
  font-size: 17px; font-weight: 800; min-width: 92px; text-align: right;
  font-variant-numeric: tabular-nums; letter-spacing: .02em;
}
.btn-end {
  background: rgba(255,255,255,.14); color: white;
  border: 1px solid rgba(255,255,255,.35);
  border-radius: 999px; padding: 7px 18px;
  cursor: pointer; font-size: 13px; font-weight: 700;
  transition: background .15s, transform .1s;
}
.btn-end:hover { background: rgba(255,255,255,.26); }
.btn-end:active { transform: scale(.96); }

/* ── GAME AREA ── */
.game-area {
  flex: 1; width: 100%; max-width: 920px; margin: 0 auto;
  display: flex; flex-direction: column; align-items: center;
  padding: clamp(16px, 3vw, 28px) 16px; gap: 18px;
}

/* Score */
.score-box {
  display: inline-flex; align-items: center; gap: 12px;
  background: var(--card); border-radius: 999px;
  padding: 8px 10px 8px 20px; box-shadow: var(--sh-sm);
}
.score-label { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: .04em; }
.score-value {
  font-size: 22px; font-weight: 800; color: var(--primary);
  min-width: 64px; text-align: center; font-variant-numeric: tabular-nums;
  background: #eef2ff; border-radius: 999px; padding: 4px 16px;
}

/* Sentence */
.sentence-box {
  text-align: center; background: var(--card); border-radius: var(--radius);
  padding: 26px 40px; box-shadow: var(--sh-md);
  width: 100%; max-width: 760px;
  transition: box-shadow .2s, background .2s;
}
.kanji-text { font-size: clamp(24px, 3.4vw, 32px); font-weight: 700; color: var(--ink); margin-bottom: 10px; line-height: 1.5; }
.hira-text { font-size: 14px; color: var(--muted); margin-bottom: 12px; letter-spacing: .06em; }
.romaji-text {
  font-size: 22px; font-weight: 700; letter-spacing: 2px;
  font-family: 'SF Mono', 'Roboto Mono', 'Courier New', monospace; line-height: 1.9;
  min-height: 42px; word-break: break-all;
}
.r-done { color: var(--faint); }
.r-cursor {
  color: white; background: var(--primary);
  border-radius: 5px; padding: 1px 3px; box-shadow: 0 2px 8px rgba(79,107,237,.4);
  animation: blink-bg 1.1s ease-in-out infinite;
}
.r-cursor.wrong { background: var(--accent); box-shadow: 0 2px 8px rgba(239,77,77,.45); animation: shake .3s ease; }
@keyframes blink-bg { 50% { background: var(--primary-d); } }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.r-todo { color: var(--ink); }

/* Keyboard */
.keyboard-wrap {
  background: linear-gradient(150deg, #dfe4ee, #d2d8e6);
  border-radius: 18px;
  padding: 16px; box-shadow: var(--sh-md), inset 0 1px 0 rgba(255,255,255,.6);
  position: relative; overflow: visible;
}
.key-row { display: flex; gap: 6px; margin-bottom: 6px; justify-content: center; }
.key-row:last-child { margin-bottom: 0; }
.key {
  height: 46px; min-width: 46px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--key-ink);
  cursor: default;
  background: linear-gradient(180deg, #fbfcfe, var(--key));
  box-shadow: 0 2px 0 var(--key-edge), 0 3px 5px rgba(40,55,100,.12);
  transition: transform .08s, box-shadow .08s, filter .1s, color .1s;
  position: relative; padding: 0 8px;
}
.key.pressed { transform: translateY(2px); box-shadow: 0 0 0 var(--key-edge), 0 1px 3px rgba(40,55,100,.15); }
.key.next-key {
  color: var(--accent-d); z-index: 2;
  background: linear-gradient(180deg, #fff, #ffeceb);
  animation: key-pulse .8s ease-in-out infinite alternate;
}
@keyframes key-pulse {
  from { box-shadow: 0 2px 0 var(--key-edge), 0 0 0 2.5px var(--accent), 0 0 7px 1px rgba(239,77,77,.35); }
  to   { box-shadow: 0 2px 0 var(--key-edge), 0 0 0 2.5px var(--accent), 0 0 18px 5px rgba(239,77,77,.65); }
}
.key.home-pos::after {
  content: ''; position: absolute; bottom: 6px;
  width: 9px; height: 3px; background: var(--key-edge); border-radius: 2px;
}

/* Key size variants */
.key-w15 { min-width: 70px; }
.key-w20 { min-width: 94px; }
.key-sp  { min-width: 320px; }

/* ── FINGER GUIDE ── */
.finger-guide {
  display: flex; align-items: center; justify-content: center; gap: clamp(12px, 3vw, 30px);
  background: var(--card); border-radius: var(--radius);
  padding: 16px 24px; box-shadow: var(--sh-md); width: 100%; max-width: 760px;
}
.hand-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.hand-label { font-size: 12px; font-weight: 800; color: var(--muted); letter-spacing: .08em; }
.hand-fingers { display: flex; gap: 5px; align-items: flex-end; }
.fng-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.fng-bar {
  width: 30px; border-radius: 15px 15px 5px 5px;
  background: linear-gradient(180deg, #e6e9f1, #d3d9e6);
  opacity: .55; transition: background .15s, opacity .15s, transform .15s, box-shadow .15s;
}
.fng-bar.active {
  background: linear-gradient(180deg, #ff6a6a, var(--accent));
  opacity: 1; transform: translateY(-6px);
  box-shadow: 0 6px 14px rgba(239,77,77,.45);
}
.fng-name { font-size: 9px; color: var(--muted); text-align: center; line-height: 1.3; }

/* Heights per finger (pinky shortest, middle tallest) */
.fng-lp .fng-bar { height: 42px; }
.fng-lr .fng-bar { height: 54px; }
.fng-lm .fng-bar { height: 62px; }
.fng-li .fng-bar { height: 54px; }
.fng-ri .fng-bar { height: 54px; }
.fng-rm .fng-bar { height: 62px; }
.fng-rr .fng-bar { height: 54px; }
.fng-rp .fng-bar { height: 42px; }
.fng-th .fng-bar { height: 34px; border-radius: 7px; width: 34px; }

/* Center example sentence (between the hands) */
.center-sentence {
  flex: 1; min-width: 240px; max-width: 460px;
  text-align: center; padding: 0 14px;
  border-left: 1px solid #eef0f6; border-right: 1px solid #eef0f6;
}
.cs-kanji { font-size: 19px; font-weight: 700; color: var(--ink); margin-bottom: 5px; line-height: 1.4; }
.cs-hira  { font-size: 11px; color: var(--muted); margin-bottom: 7px; letter-spacing: .04em; }
.cs-romaji {
  font-size: 16px; font-weight: 700; letter-spacing: 1.5px;
  font-family: 'SF Mono', 'Roboto Mono', 'Courier New', monospace; line-height: 1.6;
  word-break: break-all;
}

/* ── OVERLAYS ── */
.overlay {
  position: fixed; inset: 0; background: rgba(28,34,60,.5);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 100;
  animation: ov-in .25s ease;
}
@keyframes ov-in { from { opacity: 0; } to { opacity: 1; } }
.overlay.hidden { display: none; }
.ov-box {
  background: var(--card); border-radius: 22px; padding: clamp(28px, 5vw, 44px) clamp(24px, 6vw, 56px);
  text-align: center; box-shadow: var(--sh-lg);
  max-width: 520px; width: 90%;
  animation: pop-in .3s cubic-bezier(.2,.9,.3,1.2);
}
@keyframes pop-in { from { transform: translateY(14px) scale(.96); opacity: 0; } to { transform: none; opacity: 1; } }
.ov-title { font-size: 26px; font-weight: 800; color: var(--ink); margin-bottom: 12px; }
.ov-desc { color: var(--muted); font-size: 14px; margin-bottom: 22px; line-height: 1.7; }

/* Home-position legend */
.home-guide {
  background: #f5f7fe; border: 1px solid #e7ebf8; border-radius: 14px;
  padding: 18px; margin-bottom: 22px;
}
.home-guide strong { display: block; margin-bottom: 12px; color: var(--primary-d); font-size: 13px; letter-spacing: .04em; }
.home-keys { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
.hk-group { display: flex; gap: 5px; }
.hk { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.hk kbd {
  font-family: 'SF Mono','Roboto Mono',monospace; font-size: 13px; font-weight: 700;
  background: linear-gradient(180deg,#fff,var(--key)); color: var(--key-ink);
  border-radius: 7px; box-shadow: 0 2px 0 var(--key-edge); padding: 7px 0; width: 30px;
}
.hk.bump kbd { box-shadow: 0 2px 0 var(--key-edge), inset 0 -6px 0 -4px var(--accent); }
.hk small { font-size: 9px; color: var(--muted); }
.home-note { font-size: 12px; color: var(--muted); margin-top: 12px; }

.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 22px 0; }
.stat-card { background: #f5f7fb; border-radius: 14px; padding: 16px 10px; }
.stat-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; letter-spacing: .04em; }
.stat-val { font-size: 28px; font-weight: 800; color: var(--ink); font-variant-numeric: tabular-nums; }
.btn-primary {
  background: linear-gradient(180deg, var(--primary), var(--primary-d)); color: white; border: none;
  border-radius: 13px; padding: 14px 48px;
  font-size: 17px; font-weight: 800; cursor: pointer;
  box-shadow: 0 8px 20px rgba(79,107,237,.35); transition: transform .1s, box-shadow .2s, filter .15s;
}
.btn-primary:hover { filter: brightness(1.06); box-shadow: 0 10px 26px rgba(79,107,237,.45); }
.btn-primary:active { transform: translateY(2px); }
.btn-green { background: linear-gradient(180deg, #44d488, #2faf6a); box-shadow: 0 8px 20px rgba(52,194,122,.35); }
.btn-green:hover { box-shadow: 0 10px 26px rgba(52,194,122,.45); }

/* Mistake / correct flash on sentence box */
.sentence-box.error-flash { animation: err-flash .35s ease; }
@keyframes err-flash {
  0%,100% { box-shadow: var(--sh-md); }
  50% { box-shadow: 0 0 0 4px rgba(239,77,77,.4), var(--sh-md); }
}
.sentence-box.ok-flash { animation: ok-flash .3s ease; }
@keyframes ok-flash {
  0%,100% { background: var(--card); }
  50% { background: #e9faf1; }
}

@media (max-width: 560px) {
  .key { height: 38px; min-width: 36px; font-size: 11px; border-radius: 7px; }
  .key-sp { min-width: 200px; }
  .key-w15 { min-width: 54px; } .key-w20 { min-width: 72px; }
  .center-sentence { display: none; }
  .sentence-box { padding: 20px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hdr-left">
    <span class="hdr-title">タイピング練習</span>
    <span class="hdr-sub">日本語入力</span>
  </div>
  <div class="hdr-right">
    <span class="elapsed-label">経過時間</span>
    <div class="elapsed-text" id="elapsedText">0分 00秒</div>
    <button class="btn-end" onclick="endGame()">✕ 終了</button>
  </div>
</header>

<!-- GAME AREA -->
<div class="game-area" id="gameArea">
  <div class="score-box">
    <div class="score-label">入力文字数</div>
    <div class="score-value" id="charCount">0</div>
  </div>

  <div class="sentence-box" id="sentenceBox">
    <div class="kanji-text" id="kanjiText">　</div>
    <div class="hira-text" id="hiraText">　</div>
    <div class="romaji-text" id="romajiText">　</div>
  </div>

  <div class="keyboard-wrap" id="keyboard"></div>

  <div class="finger-guide" id="fingerGuide"></div>
</div>

<!-- START OVERLAY -->
<div class="overlay" id="startScreen">
  <div class="ov-box">
    <div class="ov-title">日本語タイピング練習</div>
    <p class="ov-desc">ホームポジションを意識しながら日本語を入力しよう。<br>次に押すキーと使う指が赤く光ります。</p>
    <div class="home-guide">
      <strong>ホームポジション（指の基本位置）</strong>
      <div class="home-keys">
        <div class="hk-group">
          <div class="hk"><kbd>A</kbd><small>小指</small></div>
          <div class="hk"><kbd>S</kbd><small>薬指</small></div>
          <div class="hk"><kbd>D</kbd><small>中指</small></div>
          <div class="hk bump"><kbd>F</kbd><small>人差し</small></div>
        </div>
        <div class="hk-group">
          <div class="hk bump"><kbd>J</kbd><small>人差し</small></div>
          <div class="hk"><kbd>K</kbd><small>中指</small></div>
          <div class="hk"><kbd>L</kbd><small>薬指</small></div>
          <div class="hk"><kbd>;</kbd><small>小指</small></div>
        </div>
      </div>
      <div class="home-note">💡 <kbd style="padding:1px 5px">F</kbd> と <kbd style="padding:1px 5px">J</kbd> の突起で、見なくても指の位置がわかります。</div>
    </div>
    <button class="btn-primary btn-green" onclick="startGame()">スタート！</button>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="overlay hidden" id="resultScreen">
  <div class="ov-box">
    <div class="ov-title">結果発表</div>
    <div class="result-grid">
      <div class="stat-card">
        <div class="stat-label">入力文字数</div>
        <div class="stat-val" id="rChars">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">完了文章数</div>
        <div class="stat-val" id="rSentences">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ミスタイプ</div>
        <div class="stat-val" id="rMistakes">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">正確率</div>
        <div class="stat-val" id="rAccuracy">—</div>
      </div>
      <div class="stat-card" style="grid-column:1/-1">
        <div class="stat-label">経過時間</div>
        <div class="stat-val" id="rTime">—</div>
      </div>
    </div>
    <button class="btn-primary btn-green" onclick="startGame()">もう一度</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────

// Romaji uses standard JIS romaji input rules
const SENTENCES = [

// ── ROMAJI INPUT ENGINE ───────────────────────────────
// Display stays kunrei (SI/TI/TU/HU/ZI…), but input also accepts the
// common alternative spellings (SHI/CHI/TSU/FU/JI/JU…). Matching works
// per kana-unit: each unit holds a list of acceptable romaji spellings.
const KMONO = {
 'あ':'A','い':'I','う':'U','え':'E','お':'O','か':'KA','き':'KI','く':'KU','け':'KE','こ':'KO',
 'が':'GA','ぎ':'GI','ぐ':'GU','げ':'GE','ご':'GO','さ':'SA','し':'SI','す':'SU','せ':'SE','そ':'SO',
 'ざ':'ZA','じ':'ZI','ず':'ZU','ぜ':'ZE','ぞ':'ZO','た':'TA','ち':'TI','つ':'TU','て':'TE','と':'TO',
 'だ':'DA','ぢ':'DI','づ':'DU','で':'DE','ど':'DO','な':'NA','に':'NI','ぬ':'NU','ね':'NE','の':'NO',
 'は':'HA','ひ':'HI','ふ':'HU','へ':'HE','ほ':'HO','ば':'BA','び':'BI','ぶ':'BU','べ':'BE','ぼ':'BO',
 'ぱ':'PA','ぴ':'PI','ぷ':'PU','ぺ':'PE','ぽ':'PO','ま':'MA','み':'MI','む':'MU','め':'ME','も':'MO',
 'や':'YA','ゆ':'YU','よ':'YO','ら':'RA','り':'RI','る':'RU','れ':'RE','ろ':'RO','わ':'WA','を':'WO',
};
const KYOUON = {
 'きゃ':'KYA','きゅ':'KYU','きょ':'KYO','ぎゃ':'GYA','ぎゅ':'GYU','ぎょ':'GYO',
 'しゃ':'SYA','しゅ':'SYU','しょ':'SYO','じゃ':'ZYA','じゅ':'ZYU','じょ':'ZYO',
 'ちゃ':'TYA','ちゅ':'TYU','ちょ':'TYO','にゃ':'NYA','にゅ':'NYU','にょ':'NYO',
 'ひゃ':'HYA','ひゅ':'HYU','ひょ':'HYO','びゃ':'BYA','びゅ':'BYU','びょ':'BYO',
 'ぴゃ':'PYA','ぴゅ':'PYU','ぴょ':'PYO','みゃ':'MYA','みゅ':'MYU','みょ':'MYO',
 'りゃ':'RYA','りゅ':'RYU','りょ':'RYO',
};
// Alternative spellings (primary first; primary equals the displayed kunrei).
const KALT = {
 'し':['SI','SHI'],'じ':['ZI','JI'],'ち':['TI','CHI'],'つ':['TU','TSU'],'ふ':['HU','FU'],
 'しゃ':['SYA','SHA'],'しゅ':['SYU','SHU'],'しょ':['SYO','SHO'],
 'ちゃ':['TYA','CHA'],'ちゅ':['TYU','CHU'],'ちょ':['TYO','CHO'],
 'じゃ':['ZYA','JA','JYA'],'じゅ':['ZYU','JU','JYU'],'じょ':['ZYO','JO','JYO'],
};
function kanaOptions(kana){
  if (KALT[kana]) return KALT[kana].slice();
  if (KYOUON[kana]) return [KYOUON[kana]];
  if (KMONO[kana]) return [KMONO[kana]];
  return [kana];
}
function buildUnits(hira){
  const s = hira.replace(/[。、]/g, '');
  const out = [];
  let i = 0, sokuon = false;
  while (i < s.length){
    const ch = s[i], pair = s.substr(i, 2);
    if (ch === 'っ'){ sokuon = true; i++; continue; }
    let opts;
    if (ch === 'ん'){ opts = ['NN']; i++; }
    else if (ch === 'ー'){ opts = ['-']; i++; }
    else if (KYOUON[pair] || KALT[pair]){ opts = kanaOptions(pair); i += 2; }
    else { opts = kanaOptions(ch); i++; }
    if (sokuon){
      // little っ doubles the first letter of whichever spelling is used
      opts = opts.map(o => (o[0] && !'AIUEO'.includes(o[0])) ? o[0] + o : o);
      sokuon = false;
    }
    out.push({ opts, primary: opts[0] });
  }
  return out;
}
// length of common prefix between the typed buffer and the primary spelling
function primaryMatchLen(){
  const cur = units[unitIdx];
  if (!cur) return 0;
  const P = cur.primary;
  let k = 0;
  while (k < curBuf.length && k < P.length && curBuf[k] === P[k]) k++;
  return k;
}

// ── GAME LOGIC ────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.add('hidden');

  elapsedSec = 0;
  charCount = 0;
  mistakes = 0;
  keystrokes = 0;
  sentencesDone = 0;
  sentIdx = 0;
  pos = 0;
  running = true;

  pool = shuffle([...SENTENCES]);

  document.getElementById('charCount').textContent = '0';
  updateElapsedDisplay();
  loadSentence();
  updateUI();

  clearInterval(timerID);
  timerID = setInterval(tick, 1000);
}

function endGame() {
  clearInterval(timerID);
  running = false;
  clearHighlights();

  const m = Math.floor(elapsedSec / 60);
  const s = elapsedSec % 60;
  const timeStr = `${m}分${String(s).padStart(2,'0')}秒`;

  document.getElementById('rChars').textContent = charCount;
  document.getElementById('rSentences').textContent = sentencesDone;
  document.getElementById('rMistakes').textContent = mistakes;
  const acc = keystrokes > 0
    ? Math.round((charCount / keystrokes) * 100) + '%'
    : '—';
  document.getElementById('rAccuracy').textContent = acc;
  document.getElementById('rTime').textContent = timeStr;
  document.getElementById('resultScreen').classList.remove('hidden');
}

function tick() {
  elapsedSec++;
  updateElapsedDisplay();
}

function updateElapsedDisplay() {
  const m = Math.floor(elapsedSec / 60);
  const s = elapsedSec % 60;
  document.getElementById('elapsedText').textContent =
    `${m}分 ${String(s).padStart(2, '0')}秒`;
}

function loadSentence() {
  if (sentIdx >= pool.length) {
    pool = shuffle([...SENTENCES]);
    sentIdx = 0;
  }
  units = buildUnits(currentSentence().hira);
  unitIdx = 0;
  curBuf = '';
}

function currentSentence() { return pool[sentIdx] || pool[0]; }

function updateUI() {
  const s = currentSentence();
  document.getElementById('kanjiText').textContent = s.kanji;
  document.getElementById('hiraText').textContent = s.hira;
  document.getElementById('csKanji').textContent = s.kanji;
  document.getElementById('csHira').textContent = s.hira;
  renderSentence(false);
  highlightNext();
}

// Renders the displayed (kunrei) romaji with done / cursor / todo coloring,
// driven by completed units + how far the buffer matches the current primary.
function renderSentence(isError) {
  const doneUnits = units.slice(0, unitIdx).map(u => u.primary).join('');
  const cur = units[unitIdx];
  let curDone = '', cursorCh = '', curTodo = '';
  if (cur) {
    const P = cur.primary;
    const k = primaryMatchLen();
    curDone  = P.slice(0, k);
    cursorCh = P[k] || '';
    curTodo  = P.slice(k + 1);
  }
  const restTodo = units.slice(unitIdx + 1).map(u => u.primary).join('');

  const html =
    `<span class="r-done">${doneUnits}${curDone}</span>` +
    (cursorCh ? `<span class="r-cursor${isError ? ' wrong' : ''}">${cursorCh}</span>` : '') +
    `<span class="r-todo">${curTodo}${restTodo}</span>`;
  document.getElementById('romajiText').innerHTML = html;
  document.getElementById('csRomaji').innerHTML = html;
}

// Highlights the next key / finger based on the current primary spelling.
function highlightNext() {
  clearHighlights();
  const cur = units[unitIdx];
  if (!cur) { redrawHands(null, null); return; }
  const ch = cur.primary[primaryMatchLen()];
  if (!ch) { redrawHands(null, null); return; }

  const keyEl = document.getElementById(`key-${ch}`);
  if (keyEl) keyEl.classList.add('next-key');

  const finger = KEY_FINGER[ch] || 'none';
  updateFingerInfo(ch, finger);
  redrawHands(finger, ch);
}

function clearHighlights() {
  document.querySelectorAll('.next-key').forEach(el => el.classList.remove('next-key'));
  document.querySelectorAll('.fng-bar.active').forEach(el => el.classList.remove('active'));
}

function updateFingerInfo(ch, finger) {
  const fngEl = document.getElementById(`fng-${finger}`);
  if (fngEl) fngEl.classList.add('active');
}

// ── INPUT ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!running) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key.length > 1) return; // ignore Enter, F-keys, arrows, etc.

  let typed = e.key.toUpperCase();
  if (!/^[A-Z-]$/.test(typed)) return; // romaji uses A–Z and the dash key

  const cur = units[unitIdx];
  if (!cur) return;

  keystrokes++;
  const nb = curBuf + typed;
  const matches = cur.opts.filter(o => o.startsWith(nb));

  if (matches.length === 0) {
    // Wrong key
    mistakes++;
    animKey(typed, false);
    flashSentence(false);
    renderSentence(true);
    setTimeout(() => renderSentence(false), 300);
    return;
  }

  // Accepted keystroke
  curBuf = nb;
  charCount++;
  document.getElementById('charCount').textContent = charCount;
  animKey(typed, true);

  if (cur.opts.includes(curBuf)) {
    // Current kana finished
    unitIdx++;
    curBuf = '';
    if (unitIdx >= units.length) {
      // Sentence complete
      sentencesDone++;
      sentIdx++;
      loadSentence();
      flashSentence(true);
    }
  }
  updateUI();
});

function animKey(keyId, correct) {
  const el = document.getElementById(`key-${keyId}`);
  if (!el) return;
  el.classList.add('pressed');
  setTimeout(() => el.classList.remove('pressed'), 130);
}

function flashSentence(ok) {
  const box = document.getElementById('sentenceBox');
  const cls = ok ? 'ok-flash' : 'error-flash';
  box.classList.remove('ok-flash', 'error-flash');
  void box.offsetWidth; // reflow
  box.classList.add(cls);
  setTimeout(() => box.classList.remove(cls), 350);
}

// ── HAND OVERLAY ──────────────────────────────────────
const FINGER_HOME = { lp:'A', lr:'S', lm:'D', li:'F', ri:'J', rm:'K', rr:'L', rp:';' };
const LEFT_SET = new Set(['lp','lr','lm','li']);

function getKbCenter(keyId) {
  const kbWrap = document.getElementById('keyboard');
  const el = document.getElementById(`key-${keyId}`);
  if (!el || !kbWrap) return null;
  const kr = kbWrap.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  return { x: er.left - kr.left + er.width/2, y: er.top - kr.top + er.height/2 };
}

function buildHandOverlay() {
  const kbWrap = document.getElementById('keyboard');
  if (!kbWrap) return;
  const old = document.getElementById('handOverlay');
  if (old) old.remove();
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.id = 'handOverlay';
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;pointer-events:none;overflow:visible;z-index:10;';
  svg.setAttribute('height', kbWrap.offsetHeight + 55);
  kbWrap.appendChild(svg);
  redrawHands(null, null);
}

function redrawHands(activeFinger, targetKeyId) {
  const svg = document.getElementById('handOverlay');
  if (!svg) return;
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  const kbWrap = document.getElementById('keyboard');
  if (!kbWrap) return;

  const kbH = kbWrap.offsetHeight;
  const palmY = kbH + 36;

  // Average x of each hand's home keys for palm center
  const avgX = keys => {
    const xs = keys.map(k => getKbCenter(k)?.x).filter(Boolean);
    return xs.length ? xs.reduce((a,b) => a+b, 0) / xs.length : null;
  };
  const leftPalmX  = avgX(['A','S','D','F']);
  const rightPalmX = avgX(['J','K','L',';']);
  if (!leftPalmX || !rightPalmX) return;

  const SKIN     = 'rgba(215,160,90,0.38)';
  const SKIN_STR = 'rgba(175,115,45,0.55)';
  const RED      = 'rgba(205,45,45,0.75)';
  const RED_STR  = 'rgba(150,18,18,0.90)';

  const mk = tag => document.createElementNS(ns, tag);

  const ellipse = (cx, cy, rx, ry, fill, str) => {
    const e = mk('ellipse');
    e.setAttribute('cx', cx); e.setAttribute('cy', cy);
    e.setAttribute('rx', rx); e.setAttribute('ry', ry);
    e.setAttribute('fill', fill); e.setAttribute('stroke', str);
    e.setAttribute('stroke-width', '2');
    svg.appendChild(e);
  };

  const tube = (px, py, tx, ty, fw, fill, str) => {
    const dx = tx-px, dy = ty-py;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 2) return;
    const ex = -dy/len, ey = dx/len;  // perpendicular unit vector
    const hw = fw/2;
    // control point curves the finger outward slightly
    const cpx = (px+tx)/2 + ex*(fw*0.55);
    const cpy = (py+ty)/2 + ey*(fw*0.55);
    const d = [
      `M ${px+ex*hw} ${py+ey*hw}`,
      `Q ${cpx+ex*hw} ${cpy+ey*hw} ${tx+ex*hw} ${ty+ey*hw}`,
      `A ${hw} ${hw} 0 0 1 ${tx-ex*hw} ${ty-ey*hw}`,
      `Q ${cpx-ex*hw} ${cpy-ey*hw} ${px-ex*hw} ${py-ey*hw}`,
      `Z`
    ].join(' ');
    const p = mk('path');
    p.setAttribute('d', d); p.setAttribute('fill', fill);
    p.setAttribute('stroke', str); p.setAttribute('stroke-width', '2');
    svg.appendChild(p);
  };

  // Palms
  ellipse(leftPalmX,  palmY, 60, 38, SKIN, SKIN_STR);
  ellipse(rightPalmX, palmY, 60, 38, SKIN, SKIN_STR);

  // Inactive fingers (draw first = behind)
  Object.entries(FINGER_HOME).forEach(([fid, homeKey]) => {
    if (fid === activeFinger) return;
    const pos = getKbCenter(homeKey);
    if (!pos) return;
    const palmX = LEFT_SET.has(fid) ? leftPalmX : rightPalmX;
    tube(palmX, palmY - 38, pos.x, pos.y, 13, SKIN, SKIN_STR);
  });

  // Active finger (draw last = on top)
  if (activeFinger && FINGER_HOME[activeFinger]) {
    const homePos = getKbCenter(FINGER_HOME[activeFinger]);
    const tPos    = targetKeyId ? getKbCenter(targetKeyId) : homePos;
    const palmX   = LEFT_SET.has(activeFinger) ? leftPalmX : rightPalmX;
    if (tPos) {
      // Dashed reach line when finger leaves home key
      if (homePos && targetKeyId && targetKeyId !== FINGER_HOME[activeFinger]) {
        const ln = mk('line');
        ln.setAttribute('x1', homePos.x); ln.setAttribute('y1', homePos.y);
        ln.setAttribute('x2', tPos.x);    ln.setAttribute('y2', tPos.y);
        ln.setAttribute('stroke', 'rgba(200,40,40,0.35)');
        ln.setAttribute('stroke-width', '2');
        ln.setAttribute('stroke-dasharray', '5,4');
        svg.appendChild(ln);
      }
      tube(palmX, palmY - 38, tPos.x, tPos.y, 16, RED, RED_STR);
    }
  }
}

// ── INIT ──────────────────────────────────────────────
buildKeyboard();
buildFingerGuide();
requestAnimationFrame(buildHandOverlay);
</script>
</body>
</html>
