<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイピング練習 - 日本語入力</title>
<style>
:root {
  /* palette */
  --p: #1a1a1a; --pd: #000; --pl: #f0f0f0;     /* main (near-black) / dark / light */
  --ok: #133463; --ok-bg: #e9edf6;             /* correct: navy */
  --ng: #b60033; --ng-bg: #fbe9ed;             /* incorrect: crimson */
  --bg: #f6f6f4; --card: #fff;                 /* page / card */
  --tx: #1a1a1a; --mu: #777; --br: #ddd;       /* text / muted / border */
  --r: 6px;                                    /* common radius */
  --hand: #ef4d4d;                             /* simulated finger (kept) */

  /* derived aliases used across the sheet */
  --ink: var(--tx); --muted: var(--mu); --faint: #bbb;
  --primary: var(--p); --primary-d: var(--pd);
  --key: #f4f4f3; --key-edge: #d9d9d6; --key-ink: #222;
  --radius: 10px;                              /* cards (slightly softer) */
  --sh-sm: 0 1px 3px rgba(0,0,0,.07);
  --sh-md: 0 5px 16px rgba(0,0,0,.08);
  --sh-lg: 0 18px 48px rgba(0,0,0,.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, 'Hiragino Kaku Gothic ProN',
               'Hiragino Sans', 'Yu Gothic', Meiryo, sans-serif;
  color: var(--ink);
  background: var(--bg);
  min-height: 100vh;
  display: flex; flex-direction: column;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  background: #141414;
  color: white;
  padding: 12px clamp(16px, 4vw, 32px);
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 18px rgba(0,0,0,.25);
  position: sticky; top: 0; z-index: 50; flex-shrink: 0;
}
.hdr-left { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
.hdr-title { font-size: 18px; font-weight: 800; letter-spacing: .04em; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.hdr-title::before { content: '⌨'; font-size: 20px; }
.hdr-sub { font-size: 12px; opacity: .75; letter-spacing: .08em; white-space: nowrap; }
.hdr-right { display: flex; align-items: center; gap: 12px; }
.elapsed-label { font-size: 12px; opacity: .8; letter-spacing: .06em; white-space: nowrap; }
.elapsed-text {
  font-size: 16px; font-weight: 800; min-width: 84px; text-align: right;
  font-variant-numeric: tabular-nums; letter-spacing: .02em; white-space: nowrap;
}
.btn-end {
  background: rgba(255,255,255,.14); color: white;
  border: 1px solid rgba(255,255,255,.35);
  border-radius: 999px; padding: 7px 18px;
  cursor: pointer; font-size: 13px; font-weight: 700;
  transition: background .15s, transform .1s;
}
.btn-end:hover { background: rgba(255,255,255,.26); }
.btn-end:active { transform: scale(.96); }
.btn-icon {
  background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.35);
  border-radius: 999px; width: 34px; height: 34px; padding: 0;
  font-size: 15px; line-height: 1; cursor: pointer;
  transition: background .15s, transform .1s; flex-shrink: 0;
}
.btn-icon:hover { background: rgba(255,255,255,.26); }
.btn-icon:active { transform: scale(.92); }
.btn-icon.off { opacity: .5; }
.volume-control {
  display: flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,.12); border-radius: 999px; padding: 3px 5px;
}
.volume-btn {
  width: 26px; height: 26px; border: 0; border-radius: 50%;
  background: transparent; color: #fff; cursor: pointer;
  font-size: 17px; font-weight: 800; line-height: 1;
}
.volume-btn:hover { background: rgba(255,255,255,.18); }
.volume-btn:disabled { opacity: .3; cursor: default; }
.volume-value {
  min-width: 36px; text-align: center; font-size: 10px; font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.mode-toggle { display: flex; background: rgba(255,255,255,.12); border-radius: 999px; padding: 3px; }
.mode-btn {
  border: none; background: transparent; color: rgba(255,255,255,.7);
  font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 999px;
  cursor: pointer; transition: background .15s, color .15s; white-space: nowrap;
}
.mode-btn.active { background: #fff; color: var(--p); }
.ov-toggle { display: inline-flex; background: var(--pl); margin: 0 auto 20px; }
.ov-toggle .mode-btn { color: var(--mu); padding: 7px 18px; font-size: 13px; }
.ov-toggle .mode-btn.active { background: var(--p); color: #fff; }
@media (max-width: 900px) {
  .hdr-sub { display: none; }
  .elapsed-label { display: none; }
  .hdr-title::before { display: none; }
  .hdr-title { font-size: 16px; }
  .hdr-right { gap: 8px; }
  .volume-value { display: none; }
}

/* ── GAME AREA ── */
.game-area {
  flex: 1; width: 100%; max-width: 920px; margin: 0 auto;
  display: flex; flex-direction: column; align-items: center;
  padding: clamp(16px, 3vw, 28px) 16px; gap: 18px;
}

/* Score */
.score-box {
  display: inline-flex; align-items: center; gap: 12px;
  background: var(--card); border: 1px solid var(--br); border-radius: 999px;
  padding: 8px 10px 8px 20px; box-shadow: var(--sh-sm);
}
.score-label { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: .04em; }
.score-value {
  font-size: 22px; font-weight: 800; color: var(--ok);
  min-width: 64px; text-align: center; font-variant-numeric: tabular-nums;
  background: var(--ok-bg); border-radius: 999px; padding: 4px 16px;
}

/* Sentence */
.sentence-box {
  text-align: center; background: var(--card);
  border: 1px solid var(--br); border-radius: var(--radius);
  padding: 26px 40px; box-shadow: var(--sh-md);
  width: 100%; max-width: 760px;
  transition: box-shadow .2s, background .2s;
}
.kanji-text { font-size: clamp(24px, 3.4vw, 32px); font-weight: 700; color: var(--ink); margin-bottom: 10px; line-height: 1.5; }
.hira-text { font-size: 14px; color: var(--muted); margin-bottom: 12px; letter-spacing: .06em; }
.romaji-text {
  font-size: 22px; font-weight: 700; letter-spacing: 2px;
  font-family: 'SF Mono', 'Roboto Mono', 'Courier New', monospace; line-height: 1.9;
  min-height: 42px; overflow-wrap: break-word; word-break: normal;
}
/* Latin modes (English / words): hide kanji; the hira slot shows the
   Japanese translation, and the typing line carries the English text. */
.mode-latin .kanji-text, .mode-latin .cs-kanji { display: none; }
.mode-latin .romaji-text { letter-spacing: 1px; }
.mode-latin .hira-text { font-size: 15px; color: var(--mu); margin-bottom: 14px; letter-spacing: 0; }
/* Word mode: make the single word the prominent line */
.mode-word .romaji-text { font-size: 30px; letter-spacing: 2px; }
.mode-word .hira-text { font-size: 16px; color: var(--ink); }
.r-done { color: var(--faint); }
.r-cursor {
  color: white; background: var(--ok);
  border-radius: var(--r); padding: 1px 4px; box-shadow: 0 2px 8px rgba(19,52,99,.3);
  animation: blink-bg 1.1s ease-in-out infinite;
}
.r-cursor.wrong {
  background: var(--ng-bg); color: var(--ng); box-shadow: inset 0 0 0 2px var(--ng);
  animation: shake .3s ease;
}
@keyframes blink-bg { 50% { background: #0d2649; } }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.r-todo { color: var(--ink); }

/* Keyboard */
.keyboard-wrap {
  background: #ececea;
  border: 1px solid var(--br); border-radius: 14px;
  padding: 16px; box-shadow: var(--sh-md), inset 0 1px 0 rgba(255,255,255,.6);
  position: relative; overflow: visible;
}
.key-row { display: flex; gap: 6px; margin-bottom: 6px; justify-content: center; }
.key-row:last-child { margin-bottom: 0; }
.key {
  height: 46px; min-width: 46px; border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--key-ink);
  cursor: default;
  background: linear-gradient(180deg, #fcfcfc, var(--key));
  box-shadow: 0 2px 0 var(--key-edge), 0 3px 5px rgba(0,0,0,.1);
  transition: transform .08s, box-shadow .08s, filter .1s, color .1s;
  position: relative; padding: 0 8px;
}
.key.pressed { transform: translateY(2px); box-shadow: 0 0 0 var(--key-edge), 0 1px 3px rgba(0,0,0,.14); }
.key.next-key {
  color: #fff; z-index: 2;
  background: linear-gradient(180deg, #1d3f73, var(--ok));
  animation: key-pulse .8s ease-in-out infinite alternate;
}
@keyframes key-pulse {
  from { box-shadow: 0 2px 0 var(--key-edge), 0 0 0 2.5px var(--ok), 0 0 7px 1px rgba(19,52,99,.35); }
  to   { box-shadow: 0 2px 0 var(--key-edge), 0 0 0 2.5px var(--ok), 0 0 18px 5px rgba(19,52,99,.6); }
}
.key.home-pos::after {
  content: ''; position: absolute; bottom: 6px;
  width: 9px; height: 3px; background: var(--key-edge); border-radius: 2px;
}

/* Key size variants */
.key-w15 { min-width: 70px; }
.key-w20 { min-width: 94px; }
.key-sp  { min-width: 320px; }

/* ── FINGER GUIDE ── */
.finger-guide {
  display: flex; align-items: center; justify-content: center; gap: clamp(12px, 3vw, 30px);
  background: var(--card); border: 1px solid var(--br); border-radius: var(--radius);
  padding: 16px 24px; box-shadow: var(--sh-md); width: 100%; max-width: 760px;
}
.hand-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.hand-label { font-size: 12px; font-weight: 800; color: var(--muted); letter-spacing: .08em; }
.hand-fingers { display: flex; gap: 5px; align-items: flex-end; }
.fng-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.fng-bar {
  width: 30px; border-radius: 15px 15px 5px 5px;
  background: linear-gradient(180deg, #e9e9e9, #d8d8d8);
  opacity: .55; transition: background .15s, opacity .15s, transform .15s, box-shadow .15s;
}
.fng-bar.active {
  background: linear-gradient(180deg, #ff6a6a, var(--hand));
  opacity: 1; transform: translateY(-6px);
  box-shadow: 0 6px 14px rgba(239,77,77,.45);
}
.fng-name { font-size: 9px; color: var(--muted); text-align: center; line-height: 1.3; }

/* Heights per finger (pinky shortest, middle tallest) */
.fng-lp .fng-bar { height: 42px; }
.fng-lr .fng-bar { height: 54px; }
.fng-lm .fng-bar { height: 62px; }
.fng-li .fng-bar { height: 54px; }
.fng-ri .fng-bar { height: 54px; }
.fng-rm .fng-bar { height: 62px; }
.fng-rr .fng-bar { height: 54px; }
.fng-rp .fng-bar { height: 42px; }
.fng-th .fng-bar { height: 34px; border-radius: 7px; width: 34px; }

/* Bottom reference panel: just the meaning text (kanji / translation) */
.center-sentence {
  flex: 1; max-width: 640px; text-align: center; padding: 0 14px;
}
.cs-kanji { font-size: 20px; font-weight: 700; color: var(--ink); line-height: 1.5; }
.cs-hira  { font-size: 16px; color: var(--ink); line-height: 1.5; }
.cs-romaji { display: none; }                 /* no romaji/English duplicate here */
body:not(.mode-latin) .cs-hira { display: none; }  /* JP shows only the kanji */

/* ── OVERLAYS ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 100;
  animation: ov-in .25s ease;
}
@keyframes ov-in { from { opacity: 0; } to { opacity: 1; } }
.overlay.hidden { display: none; }
.ov-box {
  background: var(--card); border: 1px solid var(--br); border-radius: 14px;
  padding: clamp(28px, 5vw, 44px) clamp(24px, 6vw, 56px);
  text-align: center; box-shadow: var(--sh-lg);
  max-width: 520px; width: 90%;
  animation: pop-in .3s cubic-bezier(.2,.9,.3,1.2);
}
@keyframes pop-in { from { transform: translateY(14px) scale(.96); opacity: 0; } to { transform: none; opacity: 1; } }
.ov-title { font-size: 26px; font-weight: 800; color: var(--ink); margin-bottom: 12px; }
.ov-desc { color: var(--muted); font-size: 14px; margin-bottom: 22px; line-height: 1.7; }

/* Home-position legend */
.home-guide {
  background: var(--pl); border: 1px solid var(--br); border-radius: var(--radius);
  padding: 18px; margin-bottom: 22px;
}
.home-guide strong { display: block; margin-bottom: 12px; color: var(--ok); font-size: 13px; letter-spacing: .04em; }
.home-keys { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
.hk-group { display: flex; gap: 5px; }
.hk { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.hk kbd {
  font-family: 'SF Mono','Roboto Mono',monospace; font-size: 13px; font-weight: 700;
  background: linear-gradient(180deg,#fff,var(--key)); color: var(--key-ink);
  border-radius: var(--r); box-shadow: 0 2px 0 var(--key-edge); padding: 7px 0; width: 30px;
}
.hk.bump kbd { box-shadow: 0 2px 0 var(--key-edge), inset 0 -6px 0 -4px var(--ink); }
.hk small { font-size: 9px; color: var(--muted); }
.home-note { font-size: 12px; color: var(--muted); margin-top: 12px; }

.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 22px 0; }
.stat-card { background: var(--pl); border: 1px solid var(--br); border-radius: var(--radius); padding: 16px 10px; }
.stat-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; letter-spacing: .04em; }
.stat-val { font-size: 28px; font-weight: 800; color: var(--ok); font-variant-numeric: tabular-nums; }
.btn-primary {
  background: var(--p); color: white; border: none;
  border-radius: var(--r); padding: 14px 48px;
  font-size: 17px; font-weight: 800; cursor: pointer;
  box-shadow: 0 6px 16px rgba(0,0,0,.22); transition: transform .1s, box-shadow .2s, background .15s;
}
.btn-primary:hover { background: var(--pd); box-shadow: 0 9px 22px rgba(0,0,0,.3); }
.btn-primary:active { transform: translateY(2px); }
.btn-green { background: var(--p); box-shadow: 0 6px 16px rgba(0,0,0,.22); }
.btn-green:hover { background: var(--pd); box-shadow: 0 9px 22px rgba(0,0,0,.3); }

/* Mistake / correct flash on sentence box */
.sentence-box.error-flash { animation: err-flash .35s ease; }
@keyframes err-flash {
  0%,100% { box-shadow: var(--sh-md); }
  50% { box-shadow: 0 0 0 3px var(--ng), var(--sh-md); }
}
.sentence-box.ok-flash { animation: ok-flash .3s ease; }
@keyframes ok-flash {
  0%,100% { background: var(--card); }
  50% { background: var(--ok-bg); }
}

@media (max-width: 560px) {
  .key { height: 38px; min-width: 36px; font-size: 11px; border-radius: 7px; }
  .key-sp { min-width: 200px; }
  .key-w15 { min-width: 54px; } .key-w20 { min-width: 72px; }
  .center-sentence { display: none; }
  .sentence-box { padding: 20px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hdr-left">
    <span class="hdr-title">タイピング練習</span>
    <span class="hdr-sub">日本語入力</span>
  </div>
  <div class="hdr-right">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="ja" onclick="setMode('ja')">日本語</button>
      <button class="mode-btn" data-mode="en" onclick="setMode('en')">英文</button>
      <button class="mode-btn" data-mode="word" onclick="setMode('word')">単語</button>
    </div>
    <span class="elapsed-label">経過時間</span>
    <div class="elapsed-text" id="elapsedText">0分 00秒</div>
    <button class="btn-icon" id="speakBtn" onclick="toggleSpeak()" title="読み上げ オン/オフ">🔊</button>
    <div class="volume-control" aria-label="読み上げ音量">
      <button class="volume-btn" id="volumeDown" onclick="changeVolume(-0.2)" aria-label="音量を下げる">−</button>
      <span class="volume-value" id="volumeValue">100%</span>
      <button class="volume-btn" id="volumeUp" onclick="changeVolume(0.2)" aria-label="音量を上げる" disabled>＋</button>
    </div>
    <button class="btn-end" onclick="endGame()">✕ 終了</button>
  </div>
</header>

<!-- GAME AREA -->
<div class="game-area" id="gameArea">
  <div class="score-box">
    <div class="score-label">入力文字数</div>
    <div class="score-value" id="charCount">0</div>
  </div>

  <div class="sentence-box" id="sentenceBox">
    <div class="kanji-text" id="kanjiText">　</div>
    <div class="hira-text" id="hiraText">　</div>
    <div class="romaji-text" id="romajiText">　</div>
  </div>

  <div class="keyboard-wrap" id="keyboard"></div>

  <div class="finger-guide" id="fingerGuide"></div>
</div>

<!-- START OVERLAY -->
<div class="overlay" id="startScreen">
  <div class="ov-box">
    <div class="ov-title">タイピング練習</div>
    <p class="ov-desc">ホームポジションを意識しながらタイピング。<br>次に押すキーと使う指が光ります。</p>
    <div class="mode-toggle ov-toggle">
      <button class="mode-btn active" data-mode="ja" onclick="setMode('ja')">日本語</button>
      <button class="mode-btn" data-mode="en" onclick="setMode('en')">英文</button>
      <button class="mode-btn" data-mode="word" onclick="setMode('word')">単語</button>
    </div>
    <div class="home-guide">
      <strong>ホームポジション（指の基本位置）</strong>
      <div class="home-keys">
        <div class="hk-group">
          <div class="hk"><kbd>A</kbd><small>小指</small></div>
          <div class="hk"><kbd>S</kbd><small>薬指</small></div>
          <div class="hk"><kbd>D</kbd><small>中指</small></div>
          <div class="hk bump"><kbd>F</kbd><small>人差し</small></div>
        </div>
        <div class="hk-group">
          <div class="hk bump"><kbd>J</kbd><small>人差し</small></div>
          <div class="hk"><kbd>K</kbd><small>中指</small></div>
          <div class="hk"><kbd>L</kbd><small>薬指</small></div>
          <div class="hk"><kbd>;</kbd><small>小指</small></div>
        </div>
      </div>
      <div class="home-note">💡 <kbd style="padding:1px 5px">F</kbd> と <kbd style="padding:1px 5px">J</kbd> の突起で、見なくても指の位置がわかります。</div>
    </div>
    <button class="btn-primary btn-green" onclick="startGame()">スタート！</button>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="overlay hidden" id="resultScreen">
  <div class="ov-box">
    <div class="ov-title">結果発表</div>
    <div class="result-grid">
      <div class="stat-card">
        <div class="stat-label">入力文字数</div>
        <div class="stat-val" id="rChars">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">完了文章数</div>
        <div class="stat-val" id="rSentences">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ミスタイプ</div>
        <div class="stat-val" id="rMistakes">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">正確率</div>
        <div class="stat-val" id="rAccuracy">—</div>
      </div>
      <div class="stat-card" style="grid-column:1/-1">
        <div class="stat-label">経過時間</div>
        <div class="stat-val" id="rTime">—</div>
      </div>
    </div>
    <button class="btn-primary btn-green" onclick="startGame()">もう一度</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────

// Romaji uses standard JIS romaji input rules
const SENTENCES = [
  // 日常生活
  { kanji: '毎朝歯を磨きます。',           hira: 'まいあさはをみがきます。',             romaji: 'MAIASAHAWOMIGAKIMASU' },
  { kanji: '夜は早く寝ます。',             hira: 'よるははやくねます。',                 romaji: 'YORUHAHAYAKUNEMASU' },
  { kanji: '手をよく洗います。',           hira: 'てをよくあらいます。',                 romaji: 'TEWOYOKUARAIMASU' },
  { kanji: '部屋を掃除します。',           hira: 'へやをそうじします。',                 romaji: 'HEYAWOSOUZISIMASU' },
  { kanji: '窓を開けます。',               hira: 'まどをあけます。',                     romaji: 'MADOWOAKEMASU' },
  { kanji: '電気を消します。',             hira: 'でんきをけします。',                   romaji: 'DENNKIWOKESIMASU' },
  { kanji: '鍵をかけます。',               hira: 'かぎをかけます。',                     romaji: 'KAGIWOKAKEMASU' },
  { kanji: 'お風呂に入ります。',           hira: 'おふろにはいります。',                 romaji: 'OHURONIHAIRIMASU' },
  { kanji: '料理を作ります。',             hira: 'りょうりをつくります。',               romaji: 'RYOURIWOTUKURIMASU' },
  { kanji: '日記を書きます。',             hira: 'にっきをかきます。',                   romaji: 'NIKKIWOKAKIMASU' },

const KEY_FINGER = {};
ROWS.flat().forEach(([lbl, f]) => { KEY_FINGER[lbl] = f; });

const FINGER_COLOR = {
  lp:'#4472C4', lr:'#70AD47', lm:'#FFC000', li:'#E74C3C',
  ri:'#E74C3C', rm:'#FFC000', rr:'#70AD47', rp:'#4472C4',
  th:'#8e44ad', none:'#aaa'
};

const FINGER_LABEL = {
  lp:'左小指', lr:'左薬指', lm:'左中指', li:'左人差し指',
  ri:'右人差し指', rm:'右中指', rr:'右薬指', rp:'右小指',
  th:'親指', none:'—'
};

// ── STATE ─────────────────────────────────────────────
let elapsedSec, charCount, mistakes, keystrokes, sentencesDone;
let sentIdx, timerID, running;
let mode = 'ja';  // 'ja' = 日本語(ローマ字) / 'en' = English
function activeSet() {
  if (mode === 'word') return EN_WORDS;
  if (mode === 'en') return EN_SENTENCES;
  return SENTENCES;
}
function applyModeClass() {
  document.body.classList.toggle('mode-latin', mode !== 'ja');
  document.body.classList.toggle('mode-word', mode === 'word');
}

// ── READ-ALOUD (Web Speech API) ───────────────────────
let speakOn = true;
let speechVolume = 1;
const ttsSupported = typeof window !== 'undefined' && 'speechSynthesis' in window;

// Prefer the most modern installed voice for each language. Microsoft
// "Online/Natural/Neural", Apple Premium/Enhanced/Siri and Google network
// voices win; the dated built-ins (Kyoko, Otoya, Alex, Fred…) lose.
if (ttsSupported) { speechSynthesis.getVoices(); speechSynthesis.addEventListener('voiceschanged', () => {}); }
function naturalVoice(lang) {
  if (!ttsSupported) return null;
  const language = lang.slice(0, 2).toLowerCase();
  const candidates = speechSynthesis.getVoices().filter(v =>
    (v.lang || '').toLowerCase().startsWith(language));
  if (!candidates.length) return null;

  const quality = voice => {
    const label = `${voice.name || ''} ${voice.voiceURI || ''}`.toLowerCase();
    let score = 0;
    if (/online|natural|neural/.test(label)) score += 1000; // MS Edge online — best
    if (/premium/.test(label)) score += 880;
    if (/enhanced/.test(label)) score += 820;
    if (/siri/.test(label)) score += 760;
    if (/google/.test(label)) score += 640;                 // Chrome network voices
    if (/\b(ava|samantha|allison|serena|aria|jenny|nanami)\b/.test(label)) score += 200;
    if (/\b(kyoko|otoya|o-ren|alex|fred|albert|agnes|kathy|princess|vicki|victoria|junior|ralph)\b/.test(label)) score -= 300;
    if (!voice.localService) score += 150;                  // network → usually modern
    if ((voice.lang || '').toLowerCase() === lang.toLowerCase()) score += 30;
    return score;
  };

  return candidates.sort((a, b) => quality(b) - quality(a))[0];
}

function sayText(text, lang, rate) {
  if (!text) return;
  const u = new SpeechSynthesisUtterance(text);
  const voice = naturalVoice(lang);
  u.lang = lang;
  u.rate = rate || 1;
  u.volume = speechVolume;
  if (voice) u.voice = voice;
  speechSynthesis.speak(u);     // utterances queue and play in order
}

// Read one whitespace-delimited English word, beginning at a typing-unit index.
function speakEnglishWordFrom(startIndex) {
  let i = startIndex;
  while (i < units.length && units[i].primary === ' ') i++;
  let word = '';
  while (i < units.length && units[i].primary !== ' ') {
    word += units[i].disp;
    i++;
  }
  word = word.replace(/[.,!?;:]+$/g, '');
  if (word) sayText(word, 'en-US', 0.9);
}

// Reads the current question aloud. Sentence mode starts with the first
// English word; each later word is announced after its preceding space.
function speakCurrent() {
  if (!speakOn || !ttsSupported) return;
  const s = currentSentence();
  if (!s) return;
  try { speechSynthesis.cancel(); } catch (e) {}
  if (mode === 'ja') {
    sayText(s.kanji, 'ja-JP', 1);
  } else if (mode === 'en') {
    speakEnglishWordFrom(0);
  } else { // word
    sayText(s.word, 'en-US', 0.9);
    sayText(s.ja, 'ja-JP', 1);
  }
}
function toggleSpeak() {
  speakOn = !speakOn;
  const btn = document.getElementById('speakBtn');
  btn.textContent = speakOn ? '🔊' : '🔇';
  btn.classList.toggle('off', !speakOn);
  if (!speakOn) { try { speechSynthesis.cancel(); } catch (e) {} }
  else if (running) speakCurrent();
}

function changeVolume(delta) {
  speechVolume = Math.max(0.2, Math.min(1, speechVolume + delta));
  speechVolume = Math.round(speechVolume * 10) / 10;
  document.getElementById('volumeValue').textContent = `${Math.round(speechVolume * 100)}%`;
  document.getElementById('volumeDown').disabled = speechVolume <= 0.2;
  document.getElementById('volumeUp').disabled = speechVolume >= 1;
}

let pool = [];
let units = [];   // typing units of current sentence
let unitIdx = 0;  // which unit we're on
let curBuf = '';  // chars typed toward current unit

// ── KEYBOARD BUILD ────────────────────────────────────
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  ROWS.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'key-row';
    row.forEach(([lbl, finger, extra]) => {
      const k = document.createElement('div');
      k.className = `key` + (extra ? ` ${extra}` : '');
      k.id = `key-${lbl}`;
      if (HOME_KEYS.has(lbl)) k.classList.add('home-pos');
      k.textContent = lbl === 'SPACE' ? '' : lbl;
      rowEl.appendChild(k);
    });
    kb.appendChild(rowEl);
  });
}

// ── FINGER GUIDE BUILD ────────────────────────────────
function buildFingerGuide() {
  const guide = document.getElementById('fingerGuide');
  guide.innerHTML = `
    <div class="center-sentence">
      <div class="cs-kanji" id="csKanji">　</div>
      <div class="cs-hira" id="csHira">　</div>
      <div class="cs-romaji" id="csRomaji">　</div>
    </div>`;
}

// ── ROMAJI INPUT ENGINE ───────────────────────────────
// Display stays kunrei (SI/TI/TU/HU/ZI…), but input also accepts the
// common alternative spellings (SHI/CHI/TSU/FU/JI/JU…). Matching works
// per kana-unit: each unit holds a list of acceptable romaji spellings.
const KMONO = {
 'あ':'A','い':'I','う':'U','え':'E','お':'O','か':'KA','き':'KI','く':'KU','け':'KE','こ':'KO',
 'が':'GA','ぎ':'GI','ぐ':'GU','げ':'GE','ご':'GO','さ':'SA','し':'SI','す':'SU','せ':'SE','そ':'SO',
 'ざ':'ZA','じ':'ZI','ず':'ZU','ぜ':'ZE','ぞ':'ZO','た':'TA','ち':'TI','つ':'TU','て':'TE','と':'TO',
 'だ':'DA','ぢ':'DI','づ':'DU','で':'DE','ど':'DO','な':'NA','に':'NI','ぬ':'NU','ね':'NE','の':'NO',
 'は':'HA','ひ':'HI','ふ':'HU','へ':'HE','ほ':'HO','ば':'BA','び':'BI','ぶ':'BU','べ':'BE','ぼ':'BO',
 'ぱ':'PA','ぴ':'PI','ぷ':'PU','ぺ':'PE','ぽ':'PO','ま':'MA','み':'MI','む':'MU','め':'ME','も':'MO',
 'や':'YA','ゆ':'YU','よ':'YO','ら':'RA','り':'RI','る':'RU','れ':'RE','ろ':'RO','わ':'WA','を':'WO',
};
const KYOUON = {
 'きゃ':'KYA','きゅ':'KYU','きょ':'KYO','ぎゃ':'GYA','ぎゅ':'GYU','ぎょ':'GYO',
 'しゃ':'SYA','しゅ':'SYU','しょ':'SYO','じゃ':'ZYA','じゅ':'ZYU','じょ':'ZYO',
 'ちゃ':'TYA','ちゅ':'TYU','ちょ':'TYO','にゃ':'NYA','にゅ':'NYU','にょ':'NYO',
 'ひゃ':'HYA','ひゅ':'HYU','ひょ':'HYO','びゃ':'BYA','びゅ':'BYU','びょ':'BYO',
 'ぴゃ':'PYA','ぴゅ':'PYU','ぴょ':'PYO','みゃ':'MYA','みゅ':'MYU','みょ':'MYO',
 'りゃ':'RYA','りゅ':'RYU','りょ':'RYO',
};
// Alternative spellings (primary first; primary equals the displayed kunrei).
const KALT = {
 'し':['SI','SHI'],'じ':['ZI','JI'],'ち':['TI','CHI'],'つ':['TU','TSU'],'ふ':['HU','FU'],
 'しゃ':['SYA','SHA'],'しゅ':['SYU','SHU'],'しょ':['SYO','SHO'],
 'ちゃ':['TYA','CHA'],'ちゅ':['TYU','CHU'],'ちょ':['TYO','CHO'],
 'じゃ':['ZYA','JA','JYA'],'じゅ':['ZYU','JU','JYU'],'じょ':['ZYO','JO','JYO'],
};
function kanaOptions(kana){
  if (KALT[kana]) return KALT[kana].slice();
  if (KYOUON[kana]) return [KYOUON[kana]];
  if (KMONO[kana]) return [KMONO[kana]];
  return [kana];
}
function buildUnits(hira){
  const s = hira.replace(/[。、]/g, '');
  const out = [];
  let i = 0, sokuon = false;
  while (i < s.length){
    const ch = s[i], pair = s.substr(i, 2);
    if (ch === 'っ'){ sokuon = true; i++; continue; }
    let opts;
    if (ch === 'ん'){ opts = ['NN']; i++; }
    else if (ch === 'ー'){ opts = ['-']; i++; }
    else if (KYOUON[pair] || KALT[pair]){ opts = kanaOptions(pair); i += 2; }
    else { opts = kanaOptions(ch); i++; }
    if (sokuon){
      // little っ doubles the first letter of whichever spelling is used
      opts = opts.map(o => (o[0] && !'AIUEO'.includes(o[0])) ? o[0] + o : o);
      sokuon = false;
    }
    out.push({ opts, primary: opts[0], disp: opts[0] });
  }
  return out;
}
// English: one unit per character. Matching is case-insensitive (the keyboard
// shows uppercase), so primary/opts use the uppercase key and disp keeps the
// original character. Periods stay visible but are not typing targets.
function buildUnitsEn(text){
  const out = [];
  for (const ch of text){
    if (ch === '.') {
      if (out.length) out[out.length - 1].disp += ch;
      continue;
    }
    const key = /[a-z]/i.test(ch) ? ch.toUpperCase() : ch;
    out.push({ opts: [key], primary: key, disp: ch });
  }
  return out;
}
// length of common prefix between the typed buffer and the primary spelling
function primaryMatchLen(){
  const cur = units[unitIdx];
  if (!cur) return 0;
  const P = cur.primary;
  let k = 0;
  while (k < curBuf.length && k < P.length && curBuf[k] === P[k]) k++;
  return k;
}

// ── GAME LOGIC ────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(m) {
  if (mode === m) return;
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === m));
  applyModeClass();
  if (running) startGame();   // restart immediately in the chosen mode
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.add('hidden');

  elapsedSec = 0;
  charCount = 0;
  mistakes = 0;
  keystrokes = 0;
  sentencesDone = 0;
  sentIdx = 0;
  running = true;

  applyModeClass();
  pool = shuffle([...activeSet()]);

  document.getElementById('charCount').textContent = '0';
  updateElapsedDisplay();
  loadSentence();
  updateUI();
  speakCurrent();

  clearInterval(timerID);
  timerID = setInterval(tick, 1000);
}

function endGame() {
  clearInterval(timerID);
  running = false;
  clearHighlights();

  const m = Math.floor(elapsedSec / 60);
  const s = elapsedSec % 60;
  const timeStr = `${m}分${String(s).padStart(2,'0')}秒`;

  document.getElementById('rChars').textContent = charCount;
  document.getElementById('rSentences').textContent = sentencesDone;
  document.getElementById('rMistakes').textContent = mistakes;
  const acc = keystrokes > 0
    ? Math.round((charCount / keystrokes) * 100) + '%'
    : '—';
  document.getElementById('rAccuracy').textContent = acc;
  document.getElementById('rTime').textContent = timeStr;
  document.getElementById('resultScreen').classList.remove('hidden');
}

function tick() {
  elapsedSec++;
  updateElapsedDisplay();
}

function updateElapsedDisplay() {
  const m = Math.floor(elapsedSec / 60);
  const s = elapsedSec % 60;
  document.getElementById('elapsedText').textContent =
    `${m}分 ${String(s).padStart(2, '0')}秒`;
}

function loadSentence() {
  if (sentIdx >= pool.length) {
    pool = shuffle([...activeSet()]);
    sentIdx = 0;
  }
  const s = currentSentence();
  units = mode === 'ja' ? buildUnits(s.hira)
        : buildUnitsEn(mode === 'word' ? s.word : s.text);
  unitIdx = 0;
  curBuf = '';
}

function currentSentence() { return pool[sentIdx] || pool[0]; }

function updateUI() {
  const s = currentSentence();
  // ja: kanji + reading ; en/word: Japanese translation shown in the hira slot
  const kanji = mode === 'ja' ? s.kanji : '';
  const hira  = mode === 'ja' ? s.hira  : (s.ja || '');
  document.getElementById('kanjiText').textContent = kanji;
  document.getElementById('hiraText').textContent = hira;
  document.getElementById('csKanji').textContent = kanji;
  document.getElementById('csHira').textContent = hira;
  renderSentence(false);
  highlightNext();
}

// Renders the displayed (kunrei) romaji with done / cursor / todo coloring,
// driven by completed units + how far the buffer matches the current primary.
function renderSentence(isError) {
  const dchar = c => c === ' ' ? ' ' : c;            // keep spaces visible
  const dstr  = s => s.split('').map(dchar).join('');
  const doneUnits = units.slice(0, unitIdx).map(u => dstr(u.disp)).join('');
  const cur = units[unitIdx];
  let curDone = '', cursorCh = '', curTodo = '';
  if (cur) {
    const P = cur.disp;
    const k = primaryMatchLen();
    curDone  = dstr(P.slice(0, k));
    cursorCh = dchar(P[k] || '');
    curTodo  = dstr(P.slice(k + 1));
  }
  const restTodo = units.slice(unitIdx + 1).map(u => dstr(u.disp)).join('');

  const html =
    `<span class="r-done">${doneUnits}${curDone}</span>` +
    (cursorCh ? `<span class="r-cursor${isError ? ' wrong' : ''}">${cursorCh}</span>` : '') +
    `<span class="r-todo">${curTodo}${restTodo}</span>`;
  document.getElementById('romajiText').innerHTML = html;
  document.getElementById('csRomaji').innerHTML = html;
}

// Highlights the next key / finger based on the current primary key.
function highlightNext() {
  clearHighlights();
  const cur = units[unitIdx];
  if (!cur) { redrawHands(null, null); return; }
  const ch = cur.primary[primaryMatchLen()];
  if (!ch) { redrawHands(null, null); return; }
  const keyId = ch === ' ' ? 'SPACE' : ch;

  const keyEl = document.getElementById(`key-${keyId}`);
  if (keyEl) keyEl.classList.add('next-key');

  const finger = KEY_FINGER[keyId] || 'none';
  updateFingerInfo(ch, finger);
  redrawHands(finger, keyId);
}

function clearHighlights() {
  document.querySelectorAll('.next-key').forEach(el => el.classList.remove('next-key'));
  document.querySelectorAll('.fng-bar.active').forEach(el => el.classList.remove('active'));
}

function updateFingerInfo(ch, finger) {
  const fngEl = document.getElementById(`fng-${finger}`);
  if (fngEl) fngEl.classList.add('active');
}

// ── INPUT ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!running) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key.length > 1) return; // ignore Enter, F-keys, arrows, etc.

  let typed = e.key;
  if (/[a-z]/i.test(typed)) typed = typed.toUpperCase(); // case-insensitive letters
  if (!/^[A-Z]$/.test(typed) && !' ,.-'.includes(typed)) return;
  if (typed === ' ') e.preventDefault(); // don't scroll the page

  const cur = units[unitIdx];
  if (!cur) return;

  const animId = typed === ' ' ? 'SPACE' : typed;
  keystrokes++;
  const nb = curBuf + typed;
  const matches = cur.opts.filter(o => o.startsWith(nb));

  if (matches.length === 0) {
    // Wrong key
    mistakes++;
    animKey(animId, false);
    flashSentence(false);
    renderSentence(true);
    setTimeout(() => renderSentence(false), 300);
    return;
  }

  // Accepted keystroke
  curBuf = nb;
  charCount++;
  document.getElementById('charCount').textContent = charCount;
  animKey(animId, true);

  if (cur.opts.includes(curBuf)) {
    // Current kana finished
    const completedWordBoundary = mode === 'en' && cur.primary === ' ';
    unitIdx++;
    curBuf = '';
    if (unitIdx >= units.length) {
      // Sentence complete
      sentencesDone++;
      sentIdx++;
      loadSentence();
      flashSentence(true);
      speakCurrent();   // read the next question aloud
    } else if (completedWordBoundary && speakOn && ttsSupported) {
      try { speechSynthesis.cancel(); } catch (e) {}
      speakEnglishWordFrom(unitIdx);
    }
  }
  updateUI();
});

function animKey(keyId, correct) {
  const el = document.getElementById(`key-${keyId}`);
  if (!el) return;
  el.classList.add('pressed');
  setTimeout(() => el.classList.remove('pressed'), 130);
}

function flashSentence(ok) {
  const box = document.getElementById('sentenceBox');
  const cls = ok ? 'ok-flash' : 'error-flash';
  box.classList.remove('ok-flash', 'error-flash');
  void box.offsetWidth; // reflow
  box.classList.add(cls);
  setTimeout(() => box.classList.remove(cls), 350);
}

// ── HAND OVERLAY ──────────────────────────────────────
const FINGER_HOME = { lp:'A', lr:'S', lm:'D', li:'F', ri:'J', rm:'K', rr:'L', rp:';' };
const LEFT_SET = new Set(['lp','lr','lm','li']);

function getKbCenter(keyId) {
  const kbWrap = document.getElementById('keyboard');
  const el = document.getElementById(`key-${keyId}`);
  if (!el || !kbWrap) return null;
  const kr = kbWrap.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  return { x: er.left - kr.left + er.width/2, y: er.top - kr.top + er.height/2 };
}

function buildHandOverlay() {
  const kbWrap = document.getElementById('keyboard');
  if (!kbWrap) return;
  const old = document.getElementById('handOverlay');
  if (old) old.remove();
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.id = 'handOverlay';
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;pointer-events:none;overflow:visible;z-index:10;';
  svg.setAttribute('height', kbWrap.offsetHeight + 55);
  kbWrap.appendChild(svg);
  redrawHands(null, null);
}

function redrawHands(activeFinger, targetKeyId) {
  const svg = document.getElementById('handOverlay');
  if (!svg) return;
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  const kbWrap = document.getElementById('keyboard');
  if (!kbWrap) return;

  const kbH = kbWrap.offsetHeight;
  const palmY = kbH + 36;

  // Average x of each hand's home keys for palm center
  const avgX = keys => {
    const xs = keys.map(k => getKbCenter(k)?.x).filter(Boolean);
    return xs.length ? xs.reduce((a,b) => a+b, 0) / xs.length : null;
  };
  const leftPalmX  = avgX(['A','S','D','F']);
  const rightPalmX = avgX(['J','K','L',';']);
  if (!leftPalmX || !rightPalmX) return;

  const SKIN     = 'rgba(215,160,90,0.38)';
  const SKIN_STR = 'rgba(175,115,45,0.55)';
  const RED      = 'rgba(205,45,45,0.75)';
  const RED_STR  = 'rgba(150,18,18,0.90)';

  const mk = tag => document.createElementNS(ns, tag);

  const ellipse = (cx, cy, rx, ry, fill, str) => {
    const e = mk('ellipse');
    e.setAttribute('cx', cx); e.setAttribute('cy', cy);
    e.setAttribute('rx', rx); e.setAttribute('ry', ry);
    e.setAttribute('fill', fill); e.setAttribute('stroke', str);
    e.setAttribute('stroke-width', '2');
    svg.appendChild(e);
  };

  const tube = (px, py, tx, ty, fw, fill, str) => {
    const dx = tx-px, dy = ty-py;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 2) return;
    const ex = -dy/len, ey = dx/len;  // perpendicular unit vector
    const hw = fw/2;
    // control point curves the finger outward slightly
    const cpx = (px+tx)/2 + ex*(fw*0.55);
    const cpy = (py+ty)/2 + ey*(fw*0.55);
    const d = [
      `M ${px+ex*hw} ${py+ey*hw}`,
      `Q ${cpx+ex*hw} ${cpy+ey*hw} ${tx+ex*hw} ${ty+ey*hw}`,
      `A ${hw} ${hw} 0 0 1 ${tx-ex*hw} ${ty-ey*hw}`,
      `Q ${cpx-ex*hw} ${cpy-ey*hw} ${px-ex*hw} ${py-ey*hw}`,
      `Z`
    ].join(' ');
    const p = mk('path');
    p.setAttribute('d', d); p.setAttribute('fill', fill);
    p.setAttribute('stroke', str); p.setAttribute('stroke-width', '2');
    svg.appendChild(p);
  };

  // Palms
  ellipse(leftPalmX,  palmY, 60, 38, SKIN, SKIN_STR);
  ellipse(rightPalmX, palmY, 60, 38, SKIN, SKIN_STR);

  // Inactive fingers (draw first = behind)
  Object.entries(FINGER_HOME).forEach(([fid, homeKey]) => {
    if (fid === activeFinger) return;
    const pos = getKbCenter(homeKey);
    if (!pos) return;
    const palmX = LEFT_SET.has(fid) ? leftPalmX : rightPalmX;
    tube(palmX, palmY - 38, pos.x, pos.y, 13, SKIN, SKIN_STR);
  });

  // Active finger (draw last = on top)
  if (activeFinger && FINGER_HOME[activeFinger]) {
    const homePos = getKbCenter(FINGER_HOME[activeFinger]);
    const tPos    = targetKeyId ? getKbCenter(targetKeyId) : homePos;
    const palmX   = LEFT_SET.has(activeFinger) ? leftPalmX : rightPalmX;
    if (tPos) {
      // Dashed reach line when finger leaves home key
      if (homePos && targetKeyId && targetKeyId !== FINGER_HOME[activeFinger]) {
        const ln = mk('line');
        ln.setAttribute('x1', homePos.x); ln.setAttribute('y1', homePos.y);
        ln.setAttribute('x2', tPos.x);    ln.setAttribute('y2', tPos.y);
        ln.setAttribute('stroke', 'rgba(200,40,40,0.35)');
        ln.setAttribute('stroke-width', '2');
        ln.setAttribute('stroke-dasharray', '5,4');
        svg.appendChild(ln);
      }
      tube(palmX, palmY - 38, tPos.x, tPos.y, 16, RED, RED_STR);
    }
  }
}

// ── INIT ──────────────────────────────────────────────
buildKeyboard();
buildFingerGuide();
requestAnimationFrame(buildHandOverlay);
</script>
